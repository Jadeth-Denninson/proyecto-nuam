{% extends "../base.html" %}
{% load static %}

{% block title %}Inicio Corrodor de bolsas{% endblock title %}

{% block content %}
<div class="broker-layout">

    <div class="profile-column">
        <i class="bi bi-person-circle profile-icon2"></i>
        <div class="profile-info">
            <p class="profile-label">{{ user.first_name}} {{user.last_name}}</p>
            <p class="profile-email">{{ user.email }}</p>
        </div>
    </div>

    <div class="broker-column left-column">
        <div class="dropdown">
            <button class="admin-btn dropdown-toggle bi bi-people-fill py-3 px-4 w-100" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                Gestión de Calificaciones Tributarias
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                <li><a class="dropdown-item" href="/gestores/calificaciones/nueva">Creación</a></li>
                <li><a class="dropdown-item" href="/gestores/calificaciones/">Visualización</a></li>
            </ul>
        </div>
        <div>
            <a class="dropdown-item admin-btn py-3 w-100" href="/gestores/instrumentos/nueva"> <i class="bi bi-journal-plus"></i> Creación de instrumentos financieros </a>
        </div>
    </div>

    <div id="miCarrusel" class="carousel carousel-fade carrusel-chico" data-bs-ride="carousel" data-bs-interval="5000">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="{% static 'img/carrusel2/1.jpg' %}" class="d-block w-100" alt="">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/carrusel2/2.jpg' %}" class="d-block w-100" alt="">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/carrusel2/3.png' %}" class="d-block w-100" alt="">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/carrusel2/4.png' %}" class="d-block w-100" alt="">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/carrusel2/5.png' %}" class="d-block w-100" alt="">
        </div>
    </div>
</div>

</div>
{% endblock content %}
